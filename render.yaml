# Render Blueprint - Backend + Telegram
# Connect this repo in Render Dashboard: New → Blueprint
services:
  - type: web
    name: speedy-tags-api
    runtime: node
    plan: free

    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_IDS
        sync: false
      - key: TELEGRAM_DISPATCHERS
        sync: false
      - key: BOLDY_SOURCE
        sync: false
      - key: ONETIMESECRET_USERNAME
        sync: false
      - key: ONETIMESECRET_API_KEY
        sync: false
      - key: ONETIMESECRET_REGION
        sync: false
      - key: FALLBACK_DISPATCHER_ID
        sync: false
      - key: FALLBACK_GROUP_ID
        sync: false
      - key: FALLBACK_GROUP_NAME
        sync: false
      - key: FALLBACK_CLAIM_TIMEOUT_MS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
