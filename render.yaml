services:
  - type: web
    name: speedy-tags
    runtime: node
    plan: free

    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_IDS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
